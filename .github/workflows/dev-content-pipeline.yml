name: Dev Content Pipeline

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Generate digest post
        run: python3 scripts/generate_dev_digest.py --max-items 6

      - name: Validate generated digest
        run: |
          latest_post="$(find _posts/dev/digest -name '*-dev-digest.markdown' | sort | tail -n 1)"
          if [ -z "$latest_post" ]; then
            echo "No digest file found to validate."
            exit 1
          fi
          python3 scripts/validate_dev_digest.py "$latest_post" --min-items 1

      - name: Build site
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build

      - name: Commit and push changes
        run: |
          git add _posts .pipeline
          if git diff --cached --quiet; then
            echo "No new digest generated."
            exit 0
          fi

          git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "chore: add automated dev digest"
          git push
