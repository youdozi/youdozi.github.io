  <text x="90" y="430" fill="#bfdbfe" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="34" font-weight="600">수집 → 생성 → 검증 → 빌드 → Git push</text>
  <text x="90" y="505" fill="#cbd5e1" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="24">youdozi.github.io</text>
</svg>
